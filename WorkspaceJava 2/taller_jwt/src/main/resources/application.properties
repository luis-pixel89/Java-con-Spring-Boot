#Conexio a PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/jwt_db
spring.datasource.username=postgres
spring.datasource.password=4189

#Driver
spring.datasource.driver-class-name=org.postgresql.Driver

#Hibernate crea y actualiza tablas automaticamente
spring.jpa.hibernate.ddl-auto=update

#Mostrar sql en consola
spring.jpa.show-sql=true

#Formatear SQL
spring.jpa.properties.hibernate.format_sql=true

#Logs de Spring
logging.level.org.springframework=INFO

#Logs de Hibernate SQL
logging.level.org.hibernate.SQL=DEBUG

#Mostrar parametros SQL
logging.level.org.hibernate.orm.jdbc.bind=TRACE
